<svg viewBox="0 0 950 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="pin-cutout">
      <!-- Everything white is kept -->
      <rect width="100%" height="100%" fill="white" />
      <!-- Black is cut out -->
      <!-- Inner circle cutout -->
      <circle cx="150" cy="140" r="75" fill="black" />
      <!-- Right side gap cutout -->
      <rect x="150" y="110" width="150" height="60" fill="black" />
    </mask>
  </defs>

  <g transform="translate(0, 10)">
    <!-- Map Pin with Mask -->
    <path d="M 150 40 C 210.7 40 260 89.3 260 150 C 260 215 150 300 150 300 C 150 300 40 215 40 150 C 40 89.3 89.3 40 150 40 Z" fill="#000000" mask="url(#pin-cutout)" />
    
    <!-- Antenna Tower (Inside the cutout) -->
    <!-- Base -->
    <rect x="143" y="160" width="14" height="15" fill="#000000" />
    <!-- Pole -->
    <rect x="147" y="115" width="6" height="45" fill="#000000" />
    <!-- Dot -->
    <circle cx="150" cy="110" r="8" fill="#000000" />
    
    <!-- Signal Arcs Left -->
    <path d="M 128,115 A 25,25 0 0,0 128,155" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 113,100 A 45,45 0 0,0 113,170" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 98,85   A 65,65 0 0,0 98,185"  stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" />
    
    <!-- Signal Arcs Right -->
    <path d="M 172,115 A 25,25 0 0,1 172,155" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 187,100 A 45,45 0 0,1 187,170" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 202,85  A 65,65 0 0,1 202,185" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" />
    
    <!-- Text -->
    <text x="270" y="162" font-family="'Arial Black', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="66" fill="#000000" letter-spacing="1">JMW INTELLIGENT</text>
  </g>
</svg>
