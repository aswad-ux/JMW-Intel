    <path d="M50,70 A40,40 0 0,0 50,120" stroke="#000000" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M35,60 A55,55 0 0,0 35,130" stroke="#000000" stroke-width="5" fill="none" stroke-linecap="round" />
    
    <!-- Right Arcs -->
    <path d="M105,80 A25,25 0 0,1 105,110" stroke="#000000" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M120,70 A40,40 0 0,1 120,120" stroke="#000000" stroke-width="5" fill="none" stroke-linecap="round" />
    <path d="M135,60 A55,55 0 0,1 135,130" stroke="#000000" stroke-width="5" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Text aligned with the cutout -->
  <text x="160" y="90" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="48" fill="#000000" letter-spacing="-1">JMW INTELLIGENT</text>
